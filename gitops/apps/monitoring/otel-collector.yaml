apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 1s
        send_batch_size: 256
      resource:
        attributes:
          # Hint para o exporter Loki promover service.name a label de stream
          - key: loki.resource.labels
            value: service.name
            action: insert
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        # Sem sufixo de unidade: a métrica http.server.duration vira
        # http_server_duration_count/_sum/_bucket (usada em alerta e dashboard)
        add_metric_suffixes: false
        # Converte resource attributes (service.name) em label service_name
        resource_to_telemetry_conversion:
          enabled: true
      otlp/newrelic:
        endpoint: otlp.nr-data.net:4317
        headers:
          api-key: "${env:NEW_RELIC_API_KEY}"
      loki:
        endpoint: http://togglemaster-loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/newrelic]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus, otlp/newrelic]
        logs:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [loki]
      telemetry:
        logs:
          level: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.95.0
          command:
            - "/otelcol-contrib"
            - "--config=/conf/otel-collector-config.yaml"
          env:
            - name: NEW_RELIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-api-key
                  key: api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 8889
          volumeMounts:
            - name: config-volume
              mountPath: /conf
      volumes:
        - name: config-volume
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
  selector:
    app: otel-collector
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector-monitor
  namespace: monitoring
  labels:
    release: togglemaster-prometheus
spec:
  selector:
    matchLabels:
      app: otel-collector
  endpoints:
    - port: prometheus
      path: /metrics
      interval: 15s
