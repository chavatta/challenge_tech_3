apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster-otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/chavatta/challenge_tech_3.git
    targetRevision: main
    path: gitops/apps/monitoring
    directory:
      # O secret do New Relic e gerenciado pelo pipeline (injecao de GitHub
      # Secret); excluido do sync para o ArgoCD nao restaurar o placeholder
      exclude: "newrelic-secret.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
