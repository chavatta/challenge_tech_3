apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster-prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2
    helm:
      values: |
        prometheus:
          prometheusSpec:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
        grafana:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          adminPassword: admin
          service:
            type: LoadBalancer
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://togglemaster-loki.monitoring.svc.cluster.local:3100
        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname']
              group_wait: 10s
              group_interval: 10s
              repeat_interval: 1h
              receiver: 'self-healing-webhook'
              routes:
                - match:
                    severity: critical
                  receiver: 'pagerduty-critical'
                  continue: true
                - match:
                    severity: critical
                  receiver: 'discord-chatops'
                  continue: true
                - match:
                    severity: critical
                  receiver: 'self-healing-webhook'
            receivers:
              - name: 'self-healing-webhook'
                webhook_configs:
                  - url: 'http://self-healing-service.togglemaster.svc.cluster.local:8080/webhook'
                    send_resolved: true
              - name: 'pagerduty-critical'
                pagerduty_configs:
                  - routing_key: '__PAGERDUTY_ROUTING_KEY__'
                    severity: 'critical'
                    description: '{{ .CommonAnnotations.summary }}'
                    class: 'self-healing'
                    group: 'togglemaster'
                    details:
                      alertname: '{{ .CommonLabels.alertname }}'
                      description: '{{ .CommonAnnotations.description }}'
                      namespace: '{{ .CommonLabels.namespace }}'
                    send_resolved: true
              - name: 'discord-chatops'
                discord_configs:
                  - webhook_url: '__DISCORD_WEBHOOK_URL__'
                    send_resolved: true
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
